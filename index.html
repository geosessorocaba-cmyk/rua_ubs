<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Endereço por UBS - Sorocaba (SP)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background-color: #f4f6f9; 
            color: #333;
        }
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: white; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { margin-top: 0; color: #1e293b; font-size: 24px; }
        p { color: #64748b; font-size: 15px; margin-bottom: 20px; }
        
        .busca-box { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 14px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-size: 16px; 
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #3b82f6; }
        button { 
            padding: 14px 28px; 
            background-color: #94a3b8; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: not-allowed; 
            font-weight: 600; 
            font-size: 16px; 
            white-space: nowrap; 
            transition: background-color 0.2s;
        }
        
        #map { 
            height: 55vh; 
            min-height: 350px;
            max-height: 600px;
            width: 100%; 
            margin-top: 20px; 
            border-radius: 8px; 
            display: none; 
            z-index: 1; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }
        #resultado { 
            margin-top: 20px; 
            padding: 18px; 
            border-radius: 6px; 
            font-weight: 600; 
            line-height: 1.5;
            display: none; 
            word-wrap: break-word;
        }
        
        .sucesso { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .erro { background-color: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        .info { background-color: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

        .rotulo-ubs {
            background: none;
            border: none;
            box-shadow: none;
            font-size: 14px;
            font-weight: 900;
            color: #1e293b;
            text-align: center;
            text-shadow: 
                -2px -2px 0 #FFF, 2px -2px 0 #FFF, 
                -2px 2px 0 #FFF, 2px 2px 0 #FFF,
                -1px 0px 0 #FFF, 1px 0px 0 #FFF,
                0px -1px 0 #FFF, 0px 1px 0 #FFF;
        }

        .ubs-item { margin-bottom: 8px; }
        .ubs-clickable {
            cursor: pointer;
            text-decoration: underline;
            color: #065f46;
            transition: color 0.2s;
        }
        .ubs-clickable:hover { color: #047857; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 2000;
            display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #fff; padding: 25px; border-radius: 10px;
            width: 90%; max-width: 450px; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #333; font-weight: normal; line-height: 1.6;
        }
        .modal-close {
            position: absolute; top: 12px; right: 18px;
            cursor: pointer; font-size: 22px; font-weight: bold; color: #94a3b8;
            transition: color 0.2s;
        }
        .modal-close:hover { color: #ef4444; }
        .modal-titulo { font-size: 18px; font-weight: bold; color: #1e293b; margin-bottom: 10px; margin-top: 0;}
        .modal-endereco { margin-bottom: 15px; }
        .modal-horario { font-size: 15px; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .busca-box { flex-direction: column; }
            button { width: 100%; }
            h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Descubra sua UBS - Sorocaba (SP)</h2>
    <p>Digite seu logradouro (Exemplos: Avenida Itavuvu, Avenida Brasil 60 ou 18071650):</p>
    
    <div class="busca-box">
        <input type="text" id="endereco" placeholder="Rua, avenida, número, ou CEP">
        <button id="btnBuscar" onclick="buscarEndereco()" disabled>Carregando...</button>
    </div>

    <div id="resultado"></div>
    <div id="map"></div>
</div>

<div id="modal-ubs" class="modal-overlay" onclick="fecharModalFora(event)">
    <div class="modal-content">
        <span class="modal-close" onclick="fecharPopupUbs()">×</span>
        <h3 id="modal-titulo" class="modal-titulo"></h3>
        <div id="modal-endereco" class="modal-endereco"></div>
        <div id="modal-horario" class="modal-horario"></div>
    </div>
</div>

<script>
    let dadosUbs = null;
    let indexLotesPorRua = new Map(); 
    let map = null;
    let camadasBusca = L.layerGroup();
    let camadasPoligonos = L.layerGroup(); 

    let keyEndereco = "AL_Endere?";
    let keyNumero = "AL_Numera?";
    let keyUbsLote = "UBS"; 

    document.getElementById('endereco').addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !document.getElementById('btnBuscar').disabled) { buscarEndereco(); }
    });

    // Estado de monitoramento do carregamento
    let pPoligonos = fetch('abrangencia_ubs_sorocaba.json')
        .then(response => response.ok ? response.json() : Promise.reject())
        .then(data => { dadosUbs = data; })
        .catch(() => mostrarResultado("Erro ao carregar banco de dados dos polígonos das UBS.", "erro"));

    console.log("Iniciando indexação paralela das partes de lotes (Otimização ativada)...");
    let pLotes = Promise.all([
        fetch('lotes_sorocaba_pontos/lotes_sorocaba_pontos_part1.json').then(r => r.ok ? r.json() : Promise.reject()),
        fetch('lotes_sorocaba_pontos/lotes_sorocaba_pontos_part2.json').then(r => r.ok ? r.json() : Promise.reject()),
        fetch('lotes_sorocaba_pontos/lotes_sorocaba_pontos_part3.json').then(r => r.ok ? r.json() : Promise.reject()),
        fetch('lotes_sorocaba_pontos/lotes_sorocaba_pontos_part4.json').then(r => r.ok ? r.json() : Promise.reject())
    ])
    .then(parts => {
        let totalLotes = 0;
        parts.forEach(part => {
            if (part && part.features) {
                part.features.forEach(feature => {
                    let nomeRuaOriginal = feature.properties[keyEndereco];
                    if (nomeRuaOriginal) {
                        let ruaNorm = normalizarApenasRua(nomeRuaOriginal);
                        if (!indexLotesPorRua.has(ruaNorm)) {
                            indexLotesPorRua.set(ruaNorm, []);
                        }
                        indexLotesPorRua.get(ruaNorm).push(feature);
                        totalLotes++;
                    }
                });
            }
        });
        console.log(`Sucesso! ${totalLotes} lotes indexados na memória.`);
    })
    .catch((err) => {
        console.error("Aviso: Falha ao carregar as partes de lotes.", err);
    });

    // Libera a interface somente quando toda a base local estiver perfeitamente carregada
    Promise.all([pPoligonos, pLotes]).then(() => {
        restaurarBotaoBusca();
    });

    function normalizarApenasRua(texto) {
        let t = texto.replace(/\d+/g, '').replace(/[,-]/g, ' ').trim();
        t = t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        t = t.replace(/\bAV\b/g, 'AVENIDA').replace(/\bR\b/g, 'RUA').replace(/\bSTA\b/g, 'SANTA').replace(/\bSTO\b/g, 'SANTO').replace(/\bS\b/g, 'SAO').replace(/\bDR\b/g, 'DOUTOR').replace(/\bPROF\b/g, 'PROFESSOR');
        return t.replace(/\s+/g, ' ').trim();
    }

    function restaurarBotaoBusca() {
        const btn = document.getElementById('btnBuscar');
        if (btn) {
            btn.disabled = false;
            btn.innerText = "Buscar";
            btn.style.backgroundColor = "#2563eb";
            btn.style.cursor = "pointer";
        }
    }

    function formatarEndereco(endStr) {
        if (!endStr) return "Endereço não disponível";
        let partes = endStr.split(",");
        let logradouroSemAcento = partes[0].normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
        partes[0] = `<b>${logradouroSemAcento}</b>`;
        return partes.join(",");
    }

    function formatarHorario(horStr) {
        if (!horStr) return "Horário não informado";
        if (horStr.includes("PA -") && horStr.includes("UBS -")) {
            let partes = horStr.split("PA -");
            let ubsParte = partes[0].replace("UBS -", "").trim();
            let paParte = partes[1].trim();
            return `Horários Seg. à Sex:<br>UBS - das ${ubsParte}<br>PA - das ${paParte}<br><br>Finais de Semana e Feriados:<br>Urgência (PA) - 24 Horas`;
        } else {
            let horaLimpa = horStr.trim();
            if (!horaLimpa.toLowerCase().startsWith("das ")) horaLimpa = "das " + horaLimpa;
            return `Horários Seg. à Sex: ${horaLimpa}`;
        }
    }

    function abrirPopupUbs(nome, endereco, horario) {
        document.getElementById('modal-titulo').innerText = `UBS ${nome}:`;
        document.getElementById('modal-endereco').innerHTML = formatarEndereco(endereco);
        document.getElementById('modal-horario').innerHTML = formatarHorario(horario);
        document.getElementById('modal-ubs').style.display = 'flex';
    }

    function fecharPopupUbs() {
        document.getElementById('modal-ubs').style.display = 'none';
    }

    function fecharModalFora(event) {
        if (event.target === document.getElementById('modal-ubs')) fecharPopupUbs();
    }

    function initMap(lat, lon, zoom = 13) {
        const mapDiv = document.getElementById('map');
        mapDiv.style.display = 'block';
        if (!map) {
            map = L.map('map').setView([lat, lon], zoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            camadasBusca.addTo(map);
            camadasPoligonos.addTo(map);
        }
        setTimeout(() => { map.invalidateSize(); }, 200);
    }

    function gerarPopupNominatim(resultadoItem, numeroBuscado) {
        let displayName = resultadoItem.display_name;
        let road = resultadoItem.address ? (resultadoItem.address.road || resultadoItem.address.pedestrian || resultadoItem.address.square || resultadoItem.address.suburb || resultadoItem.name) : null;

        if (road) {
            let regexRoad = new RegExp(road + "([, -]*)", 'i');
            let restoEndereco = displayName.replace(regexRoad, '');
            restoEndereco = restoEndereco.replace(/^[, -\s]+/, ''); 
            let titulo = `<b>${road.toUpperCase()}`;

            if (!numeroBuscado) {
                titulo += ` -</b> `;
            } else {
                let regexNum = new RegExp('^' + numeroBuscado + '([, -]*)', 'i');
                restoEndereco = restoEndereco.replace(regexNum, '');
                titulo += `, ${numeroBuscado} -</b> `;
            }
            return `<b>Localização Encontrada:</b><br>${titulo}${restoEndereco}`;
        }
        return `<b>Localização Encontrada:</b><br>${displayName}`;
    }

    function calcularExtensaoDentro(linhaString, poligono) {
        let comprimentoDentro = 0;
        let lines = [];
        if (linhaString.geometry.type === "LineString") { lines.push(linhaString); } 
        else if (linhaString.geometry.type === "MultiLineString") {
            linhaString.geometry.coordinates.forEach(coords => lines.push(turf.lineString(coords)));
        } else { return 999; }

        lines.forEach(linha => {
            let pedacos = turf.lineChunk(linha, 0.005, {units: 'kilometers'});
            let featureCheck = null;
            try {
                turf.featureEach(pedacos, function(pedaco) {
                    let tamanho = turf.length(pedaco, {units: 'kilometers'});
                    let ponto = turf.along(pedaco, tamanho / 2, {units: 'kilometers'});
                    if (turf.booleanPointInPolygon(ponto, poligono)) comprimentoDentro += tamanho * 1000;
                });
            } catch(e){}
        });
        return comprimentoDentro;
    }

    function getSafeCoord(feature) {
        if (feature.geometry.type === "Point") return feature.geometry.coordinates;
        if (feature.geometry.type === "MultiPoint") return feature.geometry.coordinates[0];
        return turf.centroid(feature).geometry.coordinates;
    }

    function buscarLoteExatoOuAproximado(ruaBuscadaTexto, numeroBuscado) {
        let ruaNorm = normalizarApenasRua(ruaBuscadaTexto);
        let lotesDaRua = indexLotesPorRua.get(ruaNorm);
        
        if (!lotesDaRua) {
            for (let [chave, lotes] of indexLotesPorRua.entries()) {
                if (chave.includes(ruaNorm) || ruaNorm.includes(chave)) {
                    lotesDaRua = lotes;
                    break;
                }
            }
        }

        if (!lotesDaRua || lotesDaRua.length === 0) return null;
        let nomeOficialRuaLote = lotesDaRua[0].properties[keyEndereco];

        let exato = lotesDaRua.find(l => l.properties[keyNumero] !== null && parseInt(l.properties[keyNumero]) === numeroBuscado);
        if (exato) return { feature: exato, tipo: 'exato', nome: nomeOficialRuaLote, refFeatureUbsLote: exato };

        let comNumeros = lotesDaRua.filter(l => l.properties[keyNumero] !== null && !isNaN(parseInt(l.properties[keyNumero])));
        if (comNumeros.length === 0) {
            return { feature: lotesDaRua[0], tipo: 'aproximado_rua', nome: nomeOficialRuaLote, refFeatureUbsLote: lotesDaRua[0] };
        }

        comNumeros.sort((a, b) => parseInt(a.properties[keyNumero]) - parseInt(b.properties[keyNumero]));
        let menor = null, maior = null;

        for(let l of comNumeros) {
            let num = parseInt(l.properties[keyNumero]);
            if(num <= numeroBuscado) menor = l;
            if(num >= numeroBuscado && !maior) maior = l;
        }

        if (menor && maior) {
            if (menor === maior) return { feature: menor, tipo: 'aproximado_vizinho', nome: nomeOficialRuaLote, refFeatureUbsLote: menor };
            let p1 = getSafeCoord(menor);
            let p2 = getSafeCoord(maior);
            let midpoint = turf.midpoint(turf.point(p1), turf.point(p2));
            return { feature: midpoint, tipo: 'interpolado', nome: nomeOficialRuaLote, refFeatureUbsLote: menor };
        } else if (menor || maior) {
            let vizinhoUnico = menor || maior;
            return { feature: vizinhoUnico, tipo: 'aproximado_vizinho', nome: nomeOficialRuaLote, refFeatureUbsLote: vizinhoUnico };
        }
        return null;
    }

    function buscarEndereco() {
        let enderecoDigitado = document.getElementById('endereco').value.trim();
        if (!enderecoDigitado) {
            mostrarResultado("Por favor, digite um logradouro.", "erro");
            return;
        }
        
        // Ativa trava visual de concorrência por clique
        const btn = document.getElementById('btnBuscar');
        btn.disabled = true;
        btn.innerText = "Buscando...";
        btn.style.backgroundColor = "#94a3b8";
        btn.style.cursor = "not-allowed";
        
        camadasBusca.clearLayers();
        camadasPoligonos.clearLayers();

        const cepLimpo = enderecoDigitado.replace(/\D/g, '');
        if (cepLimpo.length === 8) {
            mostrarResultado("Buscando logradouro via CEP...", "info");
            fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`)
                .then(res => res.json())
                .then(data => {
                    if (data.erro || !data.logradouro) throw new Error();
                    
                    const todosNumerosOriginal = enderecoDigitado.match(/\d+/g);
                    let numeroAdicional = "";
                    if (todosNumerosOriginal) {
                        const candidatosNum = todosNumerosOriginal.filter(n => n.length !== 8 && n.length < 5);
                        if (candidatosNum.length > 0) {
                            numeroAdicional = " " + candidatosNum[candidatosNum.length - 1];
                        }
                    }
                    executarBuscaGeografica(data.logradouro + numeroAdicional);
                }).catch(() => {
                    executarBuscaGeografica(enderecoDigitado);
                });
        } else {
            executarBuscaGeografica(enderecoDigitado);
        }
    }

    function executarBuscaGeografica(termoBusca) {
        const textoSemCep = termoBusca.replace(/\b\d{8}\b|\b\d{5}-?\d{3}\b/g, "").trim();
        const todosNumeros = textoSemCep.match(/\d+/g);
        const temNumero = todosNumeros !== null;
        const numeroBuscado = temNumero ? parseInt(todosNumeros[todosNumeros.length - 1]) : null;

        let ruaSemNumeroImovel = textoSemCep;
        if (temNumero) {
            const ultimoNumeroStr = todosNumeros[todosNumeros.length - 1];
            const idxUltimoNumero = textoSemCep.lastIndexOf(ultimoNumeroStr);
            ruaSemNumeroImovel = textoSemCep.substring(0, idxUltimoNumero) + textoSemCep.substring(idxUltimoNumero + ultimoNumeroStr.length);
        }

        let ruaNorm = normalizarApenasRua(ruaSemNumeroImovel);

        // =====================================================================
        // ROTA A: MELHORADA (Processamento Local em Memória - Rápido e Seguro)
        // =====================================================================
        if (indexLotesPorRua.size > 0) {
            let lotesDaRua = indexLotesPorRua.get(ruaNorm);
            if (!lotesDaRua) {
                for (let [chave, lotes] of indexLotesPorRua.entries()) {
                    if (chave.includes(ruaNorm) || ruaNorm.includes(chave)) {
                        lotesDaRua = lotes;
                        break;
                    }
                }
            }

            if (lotesDaRua && lotesDaRua.length > 0) {
                if (temNumero) {
                    let resultadoLote = buscarLoteExatoOuAproximado(ruaSemNumeroImovel, numeroBuscado);
                    if (resultadoLote) {
                        mostrarResultado("Processando localização na base oficial do município...", "info");
                        
                        let nomeDaUbsAtribuidaNoLote = resultadoLote.refFeatureUbsLote.properties[keyUbsLote];
                        let coords = getSafeCoord(resultadoLote.feature);
                        let latCentro = coords[1], lonCentro = coords[0];

                        let tipoTexto = resultadoLote.tipo === 'exato' ? '' : '<br><small style="color:#64748b; font-weight:normal;"><i>(A numeração exata não consta no mapeamento oficial. A localização foi aproximada de forma inteligente.)</i></small>';
                        let popupHTML = `<b>Localização Encontrada:</b><br><b>${resultadoLote.nome.toUpperCase()}, ${numeroBuscado} -</b> Sorocaba, São Paulo, Brasil${tipoTexto}`;
                        
                        initMap(latCentro, lonCentro);
                        L.marker([latCentro, lonCentro]).addTo(camadasBusca).bindPopup(popupHTML).openPopup();
                        
                        if (nomeDaUbsAtribuidaNoLote && dadosUbs) {
                            let ubsLimpa = nomeDaUbsAtribuidaNoLote.replace(/^RN\s+/i, '').trim();
                            let htmlRes = `📍 <b>Localização e Numeração identificadas!</b><br>Este imóvel é atendido pela:<br><br>`;
                            
                            turf.featureEach(dadosUbs, function (ubsPoligono) {
                                let nomePoligonoLimpo = ubsPoligono.properties.UBS ? ubsPoligono.properties.UBS.replace(/^RN\s+/i, '').trim() : "";
                                if (nomePoligonoLimpo.toLowerCase() === ubsLimpa.toLowerCase()) {
                                    let codigo = ubsPoligono.properties['Codigo microrregiao'] || ubsPoligono.properties.codigo_microrregiao || "S/N";
                                    let endSeguro = (ubsPoligono.properties.END || "").replace(/(\r\n|\n|\r)/gm, " ");
                                    let horSeguro = (ubsPoligono.properties.Horario || "").replace(/(\r\n|\n|\r)/gm, " ");
                                    let argsCliq = `'${ubsLimpa.replace(/'/g, "\\'")}', '${endSeguro.replace(/'/g, "\\'")}', '${horSeguro.replace(/'/g, "\\'")}'`;

                                    htmlRes += `<div class="ubs-item">📍 <span class="ubs-clickable" onclick="abrirPopupUbs(${argsCliq})">UBS ${ubsLimpa} - Cod. Microrregião (<b>${codigo}</b>)</span></div>`;
                                    L.geoJSON(ubsPoligono, { style: { color: "#10b981", weight: 2.5, fillOpacity: 0.12 } }).addTo(camadasPoligonos);
                                    
                                    try {
                                        let centroid = turf.centroid(ubsPoligono);
                                        let coordsC = centroid.geometry.coordinates;
                                        L.marker([coordsC[1], coordsC[0]], {
                                            icon: L.divIcon({ className: 'rotulo-ubs', html: `<div>UBS ${ubsLimpa.toUpperCase()}</div>`, iconSize: [160, 40], iconAnchor: [80, 20] }),
                                            interactive: false
                                        }).addTo(camadasPoligonos);
                                    } catch (e) {}
                                }
                            });
                            htmlRes += `<br><small style="color:#64748b; font-weight:normal;"><i>Nota: Quer saber o endereço? clique ou toque na sua UBS</i></small>`;
                            mostrarResultado(htmlRes, "sucesso");
                        } else {
                            mostrarResultado(`Endereço localizado, mas sem região de UBS atrelada no momento.`, "erro");
                        }
                        
                        map.setView([latCentro, lonCentro], 19);
                        restaurarBotaoBusca();
                        return;
                    }
                } else {
                    // Trata buscas por CEP ou ruas sem número de forma puramente local, sem bater em APIs externas!
                    mostrarResultado("Processando logradouro na base municipal...", "info");
                    let nomeOficialRuaLote = lotesDaRua[0].properties[keyEndereco];
                    
                    let ubsSet = new Set();
                    lotesDaRua.forEach(l => {
                        let ubsL = l.properties[keyUbsLote];
                        if (ubsL) ubsSet.add(ubsL.replace(/^RN\s+/i, '').trim().toLowerCase());
                    });
                    
                    let middleLote = lotesDaRua[Math.floor(lotesDaRua.length / 2)];
                    let coords = getSafeCoord(middleLote);
                    let latCentro = coords[1], lonCentro = coords[0];
                    
                    initMap(latCentro, lonCentro);
                    let popupHTML = `<b>Logradouro Encontrado:</b><br><b>${nomeOficialRuaLote.toUpperCase()}</b><br>Sorocaba, São Paulo, Brasil`;
                    L.marker([latCentro, lonCentro]).addTo(camadasBusca).bindPopup(popupHTML).openPopup();
                    
                    if (ubsSet.size > 0 && dadosUbs) {
                        let htmlRes = `Logradouro identificado! Atravessa a área de abrangência de <b>${ubsSet.size}</b> UBS(s):<br><br>`;
                        let boundsGeral = L.latLngBounds();
                        boundsGeral.extend([latCentro, lonCentro]);
                        
                        turf.featureEach(dadosUbs, function (ubsPoligono) {
                            let nomePoligonoLimpo = ubsPoligono.properties.UBS ? ubsPoligono.properties.UBS.replace(/^RN\s+/i, '').trim() : "";
                            if (ubsSet.has(nomePoligonoLimpo.toLowerCase())) {
                                let codigo = ubsPoligono.properties['Codigo microrregiao'] || ubsPoligono.properties.codigo_microrregiao || "S/N";
                                let endSeguro = (ubsPoligono.properties.END || "").replace(/(\r\n|\n|\r)/gm, " ");
                                let horSeguro = (ubsPoligono.properties.Horario || "").replace(/(\r\n|\n|\r)/gm, " ");
                                let argsCliq = `'${nomePoligonoLimpo.replace(/'/g, "\\'")}', '${endSeguro.replace(/'/g, "\\'")}', '${horSeguro.replace(/'/g, "\\'")}'`;

                                htmlRes += `<div class="ubs-item">📍 <span class="ubs-clickable" onclick="abrirPopupUbs(${argsCliq})">UBS ${nomePoligonoLimpo} - Cod. Microrregião (<b>${codigo}</b>)</span></div>`;
                                let poliLayer = L.geoJSON(ubsPoligono, { style: { color: "#10b981", weight: 2.5, fillOpacity: 0.12 } }).addTo(camadasPoligonos);
                                boundsGeral.extend(poliLayer.getBounds());
                                
                                try {
                                    let centroid = turf.centroid(ubsPoligono);
                                    let coordsC = centroid.geometry.coordinates;
                                    L.marker([coordsC[1], coordsC[0]], {
                                        icon: L.divIcon({ className: 'rotulo-ubs', html: `<div>UBS ${nomePoligonoLimpo.toUpperCase()}</div>`, iconSize: [160, 40], iconAnchor: [80, 20] }),
                                        interactive: false
                                    }).addTo(camadasPoligonos);
                                } catch (e) {}
                            }
                        });
                        
                        if (ubsSet.size > 1) {
                            htmlRes += `<br><small style="color:#64748b; font-weight:normal;"><i>Nota: Esta via abrange múltiplas regiões. Para saber a UBS exata, inclua o número do imóvel.</i><br>📍 Quer saber o endereço? clique na UBS</small>`;
                        } else {
                            htmlRes += `<br><small style="color:#64748b; font-weight:normal;"><i>Nota: Quer saber o endereço? clique na sua UBS</i></small>`;
                        }
                        mostrarResultado(htmlRes, "sucesso");
                        map.fitBounds(boundsGeral, { padding: [30, 30] });
                    } else {
                        mostrarResultado(`Endereço localizado, mas sem região de UBS atrelada no momento.`, "erro");
                        map.setView([latCentro, lonCentro], 15);
                    }
                    restaurarBotaoBusca();
                    return;
                }
            }
        }

        // =====================================================================
        // ROTA B: FALLBACK (Apenas se a rua digitada não constar nos arquivos locais)
        // =====================================================================
        const buscaFinal = termoBusca.toLowerCase().includes("sorocaba") ? termoBusca : `${termoBusca}, Sorocaba, SP`;
        mostrarResultado("Consultando base da rede viária integral...", "info");

        const urlGeocode = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(buscaFinal)}&limit=5&accept-language=pt-BR&email=geosaude.sorocaba.app@gmail.com`;

        fetch(urlGeocode)
            .then(res => { if (!res.ok) throw new Error(`Erro de rede.`); return res.json(); })
            .then(resultados => {
                if (resultados.length === 0) throw new Error("Endereço não encontrado na base de dados global.");

                let viasEncontradas = resultados.filter(r => r.class === 'highway' || r.type === 'residential');
                let nomeOficial = viasEncontradas.length > 0 && viasEncontradas[0].address && viasEncontradas[0].address.road 
                                  ? viasEncontradas[0].address.road 
                                  : (resultados[0].address && resultados[0].address.road ? resultados[0].address.road : (viasEncontradas.length > 0 ? viasEncontradas[0].name : resultados[0].name));
                
                let latCentro = parseFloat(resultados[0].lat);
                let lonCentro = parseFloat(resultados[0].lon);
                let popupHTML = gerarPopupNominatim(resultados[0], numeroBuscado);

                if (temNumero) {
                    renderizarMapaLinhaUbs(latCentro, lonCentro, true, popupHTML, null, resultados, nomeOficial);
                    restaurarBotaoBusca();
                } else {
                    const urlOverpass = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(`[out:json][timeout:15];area["name"="Sorocaba"]->.a;way(area.a)["name"="${nomeOficial}"];out geom;`)}`;
                    fetch(urlOverpass)
                        .then(res => res.ok ? res.json() : { elements: [] })
                        .then(overpassData => {
                            renderizarMapaLinhaUbs(latCentro, lonCentro, false, popupHTML, overpassData, resultados, nomeOficial);
                            restaurarBotaoBusca();
                        })
                        .catch(() => {
                            renderizarMapaLinhaUbs(latCentro, lonCentro, false, popupHTML, null, resultados, nomeOficial);
                            restaurarBotaoBusca();
                        });
                }
            })
            .catch(error => {
                mostrarResultado(`Ops! Ocorreu um erro: ${error.message}`, "erro");
                restaurarBotaoBusca();
            });
    }

    function renderizarMapaLinhaUbs(latCentro, lonCentro, temNumero, popupHtmlText, overpassData, resultadosNominatim, nomeOficial) {
        initMap(latCentro, lonCentro);

        let ubsEncontradasFeatures = [];
        let ubsNomes = new Set();
        let boundsGeral = L.latLngBounds();

        L.marker([latCentro, lonCentro]).addTo(camadasBusca).bindPopup(popupHtmlText).openPopup();
        boundsGeral.extend([latCentro, lonCentro]);

        function verificarPoligonosIntersectados(featureElemento) {
            if (dadosUbs) {
                turf.featureEach(dadosUbs, function (ubsPoligono) {
                    if (turf.booleanIntersects(featureElemento, ubsPoligono)) {
                        let extTotal = featureElemento.geometry.type.includes("Line") ? turf.length(featureElemento, {units: 'kilometers'}) * 1000 : 999;
                        let extDentro = calcularExtensaoDentro(featureElemento, ubsPoligono);
                        if (extDentro >= 15 || extTotal <= 15) {
                            let nomeUbs = ubsPoligono.properties.UBS;
                            if (nomeUbs && !ubsNomes.has(nomeUbs)) { ubsNomes.add(nomeUbs); ubsEncontradasFeatures.push(ubsPoligono); }
                        }
                    }
                });
            }
        }

        if (temNumero) {
            let pontoTurf = turf.point([lonCentro, latCentro]);
            verificarPoligonosIntersectados(pontoTurf);
        } else {
            let achouNoOverpass = false;
            if (overpassData && overpassData.elements && overpassData.elements.length > 0) {
                overpassData.elements.forEach(el => {
                    if (el.geometry && el.geometry.length > 1) {
                        achouNoOverpass = true;
                        let featureElemento = turf.lineString(el.geometry.map(pt => [pt.lon, pt.lat]));
                        const linhaNoMapa = L.polyline(el.geometry.map(pt => [pt.lat, pt.lon]), { color: "#ff2222", weight: 5, opacity: 0.85 }).addTo(camadasBusca);
                        boundsGeral.extend(linhaNoMapa.getBounds());
                        verificarPoligonosIntersectados(featureElemento);
                    }
                });
            }

            if (!achouNoOverpass && resultadosNominatim && nomeOficial) {
                let alvosGeograficos = resultadosNominatim.filter(r => r.name === nomeOficial).slice(0, 50);
                if (alvosGeograficos.length === 0) alvosGeograficos = [resultadosNominatim[0]];
                alvosGeograficos.forEach(alvo => {
                    if (alvo.geojson) {
                        const featureElemento = turf.feature(alvo.geojson);
                        const linhaNoMapa = L.geoJSON(alvo.geojson, { style: { color: "#ff2222", weight: 5, opacity: 0.85 } }).addTo(camadasBusca);
                        boundsGeral.extend(linhaNoMapa.getBounds());
                        verificarPoligonosIntersectados(featureElemento);
                    }
                });
            }
        }

        if (ubsEncontradasFeatures.length > 0) {
            let htmlResultado = temNumero ? `📍 <b>Numeração identificada geograficamente!</b><br>Este endereço pertence à área de atendimento da:<br><br>` : `Logradouro identificado! Atravessa a área de abrangência de <b>${ubsEncontradasFeatures.length}</b> UBS(s):<br><br>`;
            
            ubsEncontradasFeatures.forEach(feature => {
                let nomeUbsLimpo = feature.properties.UBS ? feature.properties.UBS.replace(/^RN\s+/i, '').trim() : "Desconhecida";
                let codigo = feature.properties['Codigo microrregiao'] || feature.properties.codigo_microrregiao || "S/N";
                let endSeguro = (feature.properties.END || "").replace(/(\r\n|\n|\r)/gm, " ");
                let horSeguro = (feature.properties.Horario || "").replace(/(\r\n|\n|\r)/gm, " ");
                let argsCliq = `'${nomeUbsLimpo.replace(/'/g, "\\'")}', '${endSeguro.replace(/'/g, "\\'")}', '${horSeguro.replace(/'/g, "\\'")}'`;

                htmlResultado += `<div class="ubs-item">📍 <span class="ubs-clickable" onclick="abrirPopupUbs(${argsCliq})">UBS ${nomeUbsLimpo} - Cod. Microrregião (<b>${codigo}</b>)</span></div>`;
                const poliLayer = L.geoJSON(feature, { style: { color: "#10b981", weight: 2.5, fillOpacity: 0.12 } }).addTo(camadasPoligonos);
                boundsGeral.extend(poliLayer.getBounds());

                try {
                    let centroid = turf.centroid(feature);
                    let coords = centroid.geometry.coordinates;
                    L.marker([coords[1], coords[0]], { icon: L.divIcon({ className: 'rotulo-ubs', html: `<div>UBS ${nomeUbsLimpo.toUpperCase()}</div>`, iconSize: [160, 40], iconAnchor: [80, 20] }), interactive: false }).addTo(camadasPoligonos);
                } catch (e) {}
            });

            if (!temNumero && ubsEncontradasFeatures.length > 1) {
                htmlResultado += `<br><small style="color:#64748b; font-weight:normal;"><i>Nota: Esta via abrange múltiplas regiões. Para saber a UBS exata, inclua o número do imóvel.</i><br>📍 Quer saber o endereço? clique na UBS</small>`;
            } else {
                htmlResultado += `<br><small style="color:#64748b; font-weight:normal;"><i>Nota: Quer saber o endereço? clique na sua UBS</i></small>`;
            }

            mostrarResultado(htmlResultado, "sucesso");
            temNumero ? map.setView([latCentro, lonCentro], 19) : map.fitBounds(boundsGeral, { padding: [30, 30] });
        } else {
            mostrarResultado("Endereço localizado, mas não intercepta nenhuma área de UBS cadastrada.", "erro");
            boundsGeral.isValid() ? map.fitBounds(boundsGeral, { padding: [30, 30] }) : map.setView([latCentro, lonCentro], 15);
        }
    }

    function mostrarResultado(mensagem, tipo) {
        const divResultado = document.getElementById('resultado');
        divResultado.innerHTML = mensagem;
        divResultado.style.display = 'block';
        divResultado.className = tipo;
    }
</script>
</body>
